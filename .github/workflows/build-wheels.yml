name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build manylinux wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "${{ matrix.python }}-manylinux_x86_64"
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y m4 diffutils &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.python }}
          path: wheelhouse/*.whl

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python: ["cp310", "cp311", "cp312", "cp313"]
        arch: ["x86_64", "arm64"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build macOS wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "${{ matrix.python }}-macosx_${{ matrix.arch }}"
          CIBW_ARCHS_MACOS: "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.arch }}-${{ matrix.python }}
          path: wheelhouse/*.whl

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python: ["cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "${{ matrix.python }}-win_amd64"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

name: Build and publish wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Build Rust-accelerated wheels for each platform ──────────────────
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.os == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
                matrix.os == 'windows-latest' && 'x86_64-pc-windows-gnu' || '' }}

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          # Linux: install m4 + Rust in manylinux container
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y m4 diffutils &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_ARCHS_LINUX: "x86_64"
          # macOS: arm64 native build
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ENVIRONMENT_MACOS: >
            CARGO_BUILD_TARGET="aarch64-apple-darwin"
          # Windows: use gnu target so GMP can build with MinGW GCC.
          # MSYS2 is pre-installed on windows-latest runners.
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_ALL_WINDOWS: >
            C:\msys64\usr\bin\pacman.exe -S --noconfirm
            mingw-w64-x86_64-gcc
            m4
            diffutils
            make
          CIBW_ENVIRONMENT_WINDOWS: >
            CARGO_BUILD_TARGET="x86_64-pc-windows-gnu"
            PATH="C:\\msys64\\mingw64\\bin;C:\\msys64\\usr\\bin;$PATH"
          # Test: verify Rust extension loads
          CIBW_TEST_COMMAND: >
            python -c "from ilt._native import gwr_rust; print('Rust extension loaded OK')"
          CIBW_TEST_REQUIRES: "mpmath numpy"
          CIBW_TEST_SKIP: "*-manylinux* *-macosx_x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build pure-Python fallback wheel ─────────────────────────────────
  build-pure-python:
    name: Build pure-Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build wheel setuptools

      - name: Build pure-Python wheel
        run: python build_pure_python.py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pure-python
          path: ./dist/*.whl

  # ── Build sdist ──────────────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # ── Publish to PyPI on tag push ──────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-pure-python, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/ilt-inversion/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
